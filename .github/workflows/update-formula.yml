name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula version and SHA
        env:
          VERSION: ${{ github.event.client_payload.version }}
          TAG: ${{ github.event.client_payload.tag }}
          SHA256: ${{ github.event.client_payload.sha256 }}
        run: |
          sed -i "s|releases/download/v[0-9]*\.[0-9]*\.[0-9]*/agent-vision-arm64\.tar\.gz|releases/download/${TAG}/agent-vision-arm64.tar.gz|" Formula/agent-vision.rb
          sed -i "s|sha256 \"[^\"]*\"|sha256 \"${SHA256}\"|" Formula/agent-vision.rb
          cat Formula/agent-vision.rb

      - name: Commit and push
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-vision.rb
          git commit -m "agent-vision ${VERSION}"
          git push
